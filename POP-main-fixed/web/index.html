<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>POP — Practice On Pause</title>
<meta name="description" content="Spaced-repetition flashcards for whenever you've got a spare minute." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#14161a" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div id="app">

  <!-- ================= HOME VIEW ================= -->
  <div id="home-view">

    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect x="16" y="24" width="17" height="52" rx="8.5" fill="#e0a45a"/>
          <rect x="49" y="24" width="17" height="52" rx="8.5" fill="#e0a45a"/>
          <circle cx="66" cy="66" r="26" fill="#14161a" stroke="#e0a45a" stroke-width="3"/>
          <text x="66" y="76" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="32" fill="#e0a45a" text-anchor="middle">P</text>
        </svg>
      </div>
      <div class="brand-text">
        <div class="display">POP</div>
        <div class="tagline">Practice On Pause</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="stat-due">0</div><div class="label">Due</div></div>
      <div class="stat"><div class="num" id="stat-total">0</div><div class="label">Cards</div></div>
      <div class="stat"><div class="num" id="stat-mastered">0</div><div class="label">Mastered</div></div>
    </div>

    <button class="cta-primary" id="start-review-btn">Review</button>
    <div class="cta-sub" id="cta-sub"></div>

    <div class="section-title">Add cards</div>
    <div class="tabs">
      <button class="tab-btn active" data-target="panel-add">Single card</button>
      <button class="tab-btn" data-target="panel-import">Import / Quizlet</button>
    </div>

    <div class="tab-panel" id="panel-add">
      <input type="text" id="front-input" placeholder="Front (question / term)" />
      <input type="text" id="back-input" placeholder="Back (answer / definition)" />
      <button class="btn-secondary" id="add-btn">Add card</button>
    </div>

    <div class="tab-panel hidden" id="panel-import">
      <div class="hint">
        From Quizlet: open your set → <b>...</b> menu → <b>Export</b> → keep
        "Tab" between term/definition and "New line" between cards → copy → paste below.
      </div>
      <textarea id="import-input" placeholder="Mitochondria&#9;Powerhouse of the cell"></textarea>
      <button class="btn-secondary" id="import-btn">Import lines</button>
    </div>

    <div class="section-title">Your deck</div>
    <div id="deck-list"></div>

  </div>

  <!-- ================= REVIEW VIEW ================= -->
  <div id="review-view">
    <div class="review-header">
      <button class="exit-btn" id="exit-review-btn">Close</button>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-count" id="progress-count">0/0</div>
    </div>

    <div class="review-body">
      <div class="flash-card" id="flash-card">
        <div class="flash-front" id="flash-front"></div>
        <div class="flash-back" id="flash-back"></div>
      </div>
    </div>

    <div class="review-actions" id="reveal-row">
      <button class="grade-btn reveal" id="reveal-btn">Reveal answer</button>
    </div>
    <div class="review-actions" id="grade-row" style="display:none;">
      <button class="grade-btn miss" id="miss-btn">Missed it</button>
      <button class="grade-btn hit" id="hit-btn">Got it</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
