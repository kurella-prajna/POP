<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #14161a;
      color: #f3f1ea;
      margin: 0;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 2px;
      font-weight: 700;
    }
    .sub {
      font-size: 11px;
      color: #8a8d94;
      margin-bottom: 14px;
    }
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .stat b { display: block; font-size: 18px; color: #e0a45a; }
    .stat span { font-size: 10px; color: #8a8d94; text-transform: uppercase; }

    textarea, input {
      width: 100%;
      box-sizing: border-box;
      background: #1e2126;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: #f3f1ea;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }

    button {
      width: 100%;
      background: #e0a45a;
      color: #14161a;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      margin-bottom: 6px;
    }
    button.secondary {
      background: #3a3d44;
      color: #f3f1ea;
    }

    #abf-list {
      max-height: 140px;
      overflow-y: auto;
      margin-top: 10px;
      font-size: 12px;
    }
    .abf-item {
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .abf-item .box {
      color: #8a8d94;
      font-size: 10px;
      white-space: nowrap;
    }
    .abf-remove {
      background: none;
      border: none;
      color: #8a8d94;
      cursor: pointer;
      width: auto;
      padding: 0 4px;
      margin: 0;
    }
    .abf-remove:hover { color: #e05a5a; }
    label { font-size: 11px; color: #8a8d94; display: block; margin-bottom: 4px; }

    .abf-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .abf-streak {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(224,164,90,0.15);
      color: #e0a45a;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 9px;
      border-radius: 999px;
      white-space: nowrap;
      margin-top: 1px;
    }
    .abf-warning {
      background: rgba(224,164,90,0.12);
      color: #e0a45a;
      font-size: 11px;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 10px;
    }
    .abf-boxes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .abf-box {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 6px 4px;
      text-align: center;
    }
    .abf-box { padding: 7px 4px 6px; }
    .abf-box b { display: block; font-size: 14px; margin-bottom: 2px; }
    .abf-box span { font-size: 9px; color: #8a8d94; text-transform: uppercase; letter-spacing: 0.3px; }

    .abf-goal-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }
    .abf-goal-row button {
      margin-bottom: 0;
      background: #1e2126;
      color: #f3f1ea;
      padding: 7px 0;
    }
    .abf-goal-row button.active {
      background: #e0a45a;
      color: #14161a;
    }
    .abf-progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .abf-progress-track {
      flex: 1;
      height: 7px;
      background: #1e2126;
      border-radius: 999px;
      overflow: hidden;
    }
    .abf-progress-fill {
      height: 100%;
      background: #6fbf73;
      width: 0%;
    }
    .abf-progress-label {
      font-size: 10px;
      color: #8a8d94;
      white-space: nowrap;
    }
    .abf-session-card {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      display: none;
    }
    .abf-session-front { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .abf-session-back { font-size: 12px; color: #c7c9cf; margin-bottom: 8px; }
    .abf-session-actions { display: flex; gap: 6px; }
    .abf-session-actions button { margin-bottom: 0; }
    .abf-btn-miss { background: #3a3d44 !important; color: #f3f1ea !important; }
    .abf-btn-hit { background: #6fbf73 !important; color: #14161a !important; }
    hr.abf-divider { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 12px 0; }
    #abf-study-btn { margin-top: 2px; }
  </style>
</head>
<body>
  <div class="abf-topbar">
    <div>
      <h1>POP</h1>
      <div class="sub">Practice On Pause — pops up during YouTube ads.</div>
    </div>
    <div class="abf-streak" id="abf-streak">🔥 0 day streak</div>
  </div>

  <div class="abf-warning" id="abf-warning" style="display:none;"></div>

  <div class="stats">
    <div class="stat"><b id="abf-adbreaks">0</b><span>ad breaks repped</span></div>
    <div class="stat"><b id="abf-accuracy">0%</b><span>accuracy</span></div>
    <div class="stat"><b id="abf-count">0</b><span>cards</span></div>
  </div>

  <div class="abf-boxes">
    <div class="abf-box"><b id="abf-box-fizz">0</b><span>Fizz</span></div>
    <div class="abf-box"><b id="abf-box-bubble">0</b><span>Bubble</span></div>
    <div class="abf-box"><b id="abf-box-popped">0</b><span>Popped</span></div>
  </div>

  <label>Quick practice session</label>
  <div class="abf-goal-row" id="abf-goal-row">
    <button data-goal="5">5</button>
    <button data-goal="10" class="active">10</button>
    <button data-goal="15">15</button>
    <button data-goal="20">20</button>
  </div>
  <div class="abf-progress-wrap">
    <div class="abf-progress-track"><div class="abf-progress-fill" id="abf-progress-fill"></div></div>
    <span class="abf-progress-label" id="abf-progress-label">0 / 10 cards</span>
  </div>

  <div class="abf-session-card" id="abf-session-card">
    <div class="abf-session-front" id="abf-session-front"></div>
    <div class="abf-session-back" id="abf-session-back" style="display:none;"></div>
    <div class="abf-session-actions" id="abf-session-reveal-row">
      <button id="abf-session-reveal">Reveal answer</button>
    </div>
    <div class="abf-session-actions" id="abf-session-grade-row" style="display:none;">
      <button class="abf-btn-miss" id="abf-session-miss">Missed it</button>
      <button class="abf-btn-hit" id="abf-session-hit">Got it</button>
    </div>
  </div>

  <button id="abf-study-btn">Study now</button>

  <hr class="abf-divider" />

  <label>Add a card</label>
  <input id="abf-front-input" placeholder="Front (question / term)" />
  <input id="abf-back-input" placeholder="Back (answer / definition)" />
  <button id="abf-add-btn">Add card</button>

  <label>
    Import from Quizlet: open your set → <b>...</b> menu → <b>Export</b> →
    keep "Tab" between term/definition and "New line" between cards → copy →
    paste below
  </label>
  <textarea id="abf-import" placeholder="Mitochondria	Powerhouse of the cell"></textarea>
  <button class="secondary" id="abf-import-btn">Import lines</button>
  <button class="secondary" id="abf-export-btn">Export deck (Quizlet format)</button>

  <div id="abf-list"></div>

  <script src="popup.js"></script>
</body>
</html>
